# LEGACY EXAMPLE
# This file predates the Phase 1 canonical WorkflowDefinition contract.
name: "code-review"
memory:
  backend: "sqlite"
  scope: "user"

nodes:
  - id: code-analyzer
    type: "agent"
    config:
      role: "代码分析师 - 负责分析代码结构和质量"
      prompt: |
        你是一名专业的代码分析师，负责深入分析代码的质量和结构。

        你的任务：
        1. 读取并理解代码的整体架构
        2. 分析代码复杂度和可维护性
        3. 检查代码规范和最佳实践
        4. 识别潜在的性能问题
        5. 评估测试覆盖率

        分析维度：
        - 代码结构（模块化、耦合度）
        - 编码规范（命名、格式、注释）
        - 设计模式使用
        - 错误处理机制
        - 资源管理

        提供详细的代码质量报告。
      tools: []

  - id: reviewer
    type: "agent"
    config:
      role: "代码审查专家 - 负责识别具体问题"
      prompt: |
        你是一名严谨的代码审查专家，负责识别代码中的具体问题。

        你的任务：
        1. 基于代码分析的结果
        2. 识别具体的代码问题和缺陷
        3. 评估问题的严重程度
        4. 检查是否有安全漏洞

        审查重点：
        - 逻辑错误和边界条件
        - 资源泄漏和内存管理
        - 并发安全问题
        - 可读性和可维护性问题
        - 性能瓶颈

        对每个问题进行详细说明。
      tools: []

  - id: suggester
    type: "agent"
    config:
      role: "改进建议专家 - 负责提供建设性意见"
      prompt: |
        你是一名代码改进专家，负责提供具体的改进建议。

        你的任务：
        1. 接收代码审查发现的问题
        2. 为每个问题提供具体的改进方案
        3. 提供重构建议和最佳实践
        4. 生成示例代码展示改进效果

        建议原则：
        - 提供可执行的改进步骤
        - 解释改进的理由和好处
        - 考虑技术约束和业务需求
        - 保持代码的向后兼容性

        生成完整的代码审查报告。
      tools: []

edges:
  - from: code-analyzer
    to: reviewer
    condition: "true"

  - from: reviewer
    to: suggester
    condition: "issue_count > 0"

  - from: suggester
    to: "output"
    type: "final"
