version: "shadowflow-assembly/v1"
name: ShadowFlow_Team_Assembly
description: >
  AI Team 组装工作流。两条本质不同的路:
  Path A(@skill:<id>)= 读取目标 skill 的既定蓝图并忠实实例化(复现,daemon-led,确定性);
  Path B(纯目标)= 从目标设计团队(recipe 或 LLM emit)。
  RACI 写在每个 <sf:node>;PolicyMatrix 由 daemon 保存时从 DAG+RACI 派生(本工作流不 emit)。

parameters:
  goal:
    type: string
    description: "用户目标(必填)。Path B 的设计锚点;Rule 据它做单/多 agent 裁决。"
  skill_id:
    type: string
    description: "经 @skill:<id> 触发时的目标 skill id。**提供则走 Path A**(实例化该 skill 的既定蓝图);为空走 Path B。"
  mode:
    type: string
    description: "single | team(选填)。用户显式指定优先。"

# ── Path A 构造配方(SPEC / Skill 维度:"怎么造")────────────────────────────
# 引擎确定性建队的唯一真源(server/src/lib/skill-compiler tryStructuredCompile 读这里)。
# 这是「怎么造」(Skill),不是「不许越的线」——
#   ⛔ roster 上限 / 单 agent 守卫 / 治理 = Rule(B),不放这,留在
#      src/lib/assemblyRules.ts + server/src/assembly/rules,由 enforceRules 出口卡。
# 改这块 = 改引擎建队行为(无需改代码)。缺省/缺失时引擎用内置默认值,行为不变。
path_a_structured:
  members_source: agent_files       # 成员从哪来(目前只支持 agent_files)
  edge_strategy: phase-dir-order    # DAG 怎么排:phase-dir-order(按阶段目录 1-→2-→3-)| sequential(磁盘顺序)
  raci_rules: role-table            # RACI 怎么派生(声明式;矩阵由前端 deriveRaci 按 role 表派生)
  persona: verbatim                 # persona 逐字取用、不改写不截断

agent:
  name: "Team-Assembly-Director"
  system_prompt: |
    你是 Team 组装指挥官。准则:
    1.【先分流】有 skill_id → Path A(读既定蓝图、实例化);无 → Path B(从目标设计)。
    2.【立即组装】禁止反问/discovery;产出 <sf:*> 帧,不是散文。
    3.【Path A 忠实复现】verbatim 用目标 skill 的 persona/model/tools;蓝图有几个 agent
       emit 几个;不增删、不改写、不截断。
    4.【RACI 是 agent 属性】写在 <sf:node raci=...>;不手动 emit PolicyMatrix(daemon 派生)。
    5.【Rule 出口】产出过装配 Rule(单 agent 守卫 / roster 上限),确定性兜底。

on_abort: |
  组装中断:不留半成品。未 <sf:complete/> 的组装不落库(RunBus 重连=重放不重跑)。
  向用户确认「组装已中断,未保存」。

# ── 分流 ───────────────────────────────────────────────────────────────────
tasks:
  - id: step_0_route
    name: "分流:@skill 还是 纯目标"
    instruction: |
      检查是否有 {{parameters.skill_id}}:
      - 有 → 执行 Path A 的 step_a*(跳过所有 step_b*)。
      - 无 → 执行 Path B 的 step_b*(跳过所有 step_a*)。
    expected_output: "选定 Path A 或 Path B。"

  # ════════════════════════════════════════════════════════════════════════
  # Path A · @skill:<id> —— 读既定蓝图 + 忠实实例化(复现)
  # ════════════════════════════════════════════════════════════════════════
  - id: step_a0_resolve
    name: "[A] 定位蓝图来源(已在上下文 / 需 read_skill 拉取)"
    depends_on: [step_0_route]
    when: "parameters.skill_id 非空"
    instruction: |
      先判断目标 skill {{parameters.skill_id}} 的蓝图是否**已随系统提示给出**
      (见"=== 目标 skill 上下文 ===")。
      - 已给出 → 直接进 step_a1,用上下文里的蓝图。
      - **未给出 / 不完整 / 上下文显示"未找到(skill_unresolved)"** → 调用工具
        `read_skill(ref="{{parameters.skill_id}}")` 拉取真实蓝图。ref 解析顺序:
          1. skill id   → `.shadowflow/skills/<id>/`(及其 `references/`)
          2. 本地路径    → 目录(按 skill 打包读)或单文件
          3. https URL  → 直接抓取(如 raw SKILL.md / team yaml 的链接)
        运行时未提供 read_skill 工具时(如 CLI/ACP 路),改用你自带的文件/网页读取
        能力按同样的来源去读。
      🚨 read_skill 返回 error = 真没找到:**如实告知用户"未找到该 skill",绝不凭空
        编造蓝图**。
    expected_output: "蓝图文本到手(来自上下文或 read_skill);或确认未找到并终止。"

  - id: step_a1_read_blueprint
    name: "[A] 解析目标 skill 的既定蓝图"
    depends_on: [step_a0_resolve]
    when: "parameters.skill_id 非空"
    instruction: |
      从 step_a0 拿到的蓝图文本里解析出 team 结构,来源优先级:
      1. `team_ref` → `.shadowflow/teams/<ref>.team.yaml`(成员 ids + edges)
      2. 编译出的 teamConfig(getCompiledSkill)
      3. 该 skill 真实声明的 agent(它的 agent 定义文件 / SKILL.md frontmatter 的
         agents 段)+ workflow 段。
      读出:有哪些 agent(id/title/persona/model/tools/raci)、DAG 边、谁是 coordinator。
      🚨 agent 一律取自 skill 真实声明的 agent,**绝不**把非 agent 的清单(安装模块/
         包注册表/目录名/占位)当成 agent,也不臆造角色。读不到真 agent 就如实说明、不编造。
      🚨 这是复现既定结构,不是设计 —— 不要 classify/不要拆角色,照蓝图来。
    expected_output: "完整 roster(agent 列表 + 各自 persona/model/tools/raci)+ edges。"

  - id: step_a2_instantiate
    name: "[A] 忠实实例化(逐 agent emit,verbatim)"
    depends_on: [step_a1_read_blueprint]
    when: "parameters.skill_id 非空"
    instruction: |
      对蓝图中**每个** agent(不增删):
      1. emit <sf:node id="<id>" type="agent|coordinator" title="..." sub="..."
         model="<蓝图 model>" tools_picked="<蓝图 tools>"
         raci="<蓝图声明的 raci;无则按角色派生>"/>
      2. emit <sf:agent-persona node_id="<id>" source="<id>.agent.yaml#persona">
         <蓝图原文 persona,verbatim,不改写不截断>
         </sf:agent-persona>
      然后按蓝图 emit 所有 <sf:edge from to kind/> 还原 DAG。
      🚨 蓝图有几个 agent 就 emit 几个;绝不新造蓝图没有的 agent;persona 一字不改。
    expected_output: "N 个 <sf:node>(=蓝图 agent 数)+ N 个完整 <sf:agent-persona> + 蓝图全部 edges。"

  - id: step_a3_complete
    name: "[A] 收尾"
    depends_on: [step_a2_instantiate]
    when: "parameters.skill_id 非空"
    instruction: "过 Rule 出口(通常已合规)后 emit <sf:complete/>。"
    expected_output: "<sf:complete/>;daemon 落库 team+agents(verbatim)+DAG+RACI,派生 PolicyMatrix。"

  # ════════════════════════════════════════════════════════════════════════
  # Path B · 纯目标 —— 从目标设计团队(创造)
  # ════════════════════════════════════════════════════════════════════════
  - id: step_b1_classify
    name: "[B] 分析目标需求"
    depends_on: [step_0_route]
    when: "parameters.skill_id 为空"
    instruction: |
      按 {{parameters.goal}} 判定 output_type 与 mode(用户明确"一个 agent"→single)。
      emit <sf:classify output_type="..." mode="..." confidence="0.x" complexity="N"/>
    expected_output: "1 个 classify 帧。"

  - id: step_b2_design
    name: "[B] 设计团队蓝图"
    depends_on: [step_b1_classify]
    when: "parameters.skill_id 为空"
    instruction: |
      daemon 若有 recipe 命中 {{parameters.goal}} → 用 recipe 的固定结构;
      否则你设计:team → coordinator + 2~4 个 agent;single → 1 个 agent。
      为每个角色定 title/persona/model/tools 及 raci(coordinator→plan/approve=R,gate=A;
      reviewer→review=R,approve=A;普通 agent→draft=R,有工具 tool=R)。
    expected_output: "设计出 roster(角色 + persona/model/tools/raci)。"

  - id: step_b3_emit
    name: "[B] emit 角色 + 工具 + DAG"
    depends_on: [step_b2_design]
    when: "parameters.skill_id 为空"
    instruction: |
      每个角色 emit <sf:node raci=... tools_picked=.../> + <sf:agent-persona>(完整);
      按设计 emit <sf:edge> 还原 DAG。RACI 在节点上;PolicyMatrix 交 daemon 派生。
    expected_output: "nodes + personas + edges 全部 emit。"

  - id: step_b4_complete
    name: "[B] 收尾"
    depends_on: [step_b3_emit]
    when: "parameters.skill_id 为空"
    instruction: "过 Rule 出口(单 agent 守卫 / roster 截断)后 emit <sf:complete/>。"
    expected_output: "<sf:complete/>;daemon 落库并派生 PolicyMatrix。"
