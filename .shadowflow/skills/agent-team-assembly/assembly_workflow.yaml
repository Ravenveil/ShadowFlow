version: "shadowflow-assembly/v2"
name: ShadowFlow_Team_Assembly
description: >
  @skill 团队组装工作流(只管"复现"一条路)。用户 @skill:<id> 时,读取该 skill **自己声明的**
  团队蓝图(team_ref / module.yaml agents / agents 目录),忠实实例化成 team —— 不设计、不臆造。
  (无 @skill 的"纯目标设计"是另一个 skill:agent-team-blueprint,别在这里做。)
  工作流分 5 个节点,每个节点 emit <sf:step> 驱动前端「配置进度」卡;RACI 写在 <sf:node>,
  PolicyMatrix 由 daemon 从 DAG+RACI 派生。

parameters:
  skill_id:
    type: string
    description: "(必填)被 @skill:<id> 的目标 skill id —— 要复现其既定团队蓝图。"
  goal:
    type: string
    description: "(选填)用户附带的一句目标,作为上下文;本 skill 不据它设计,只复现蓝图。"

# ── Path A 构造配方(SPEC / Skill 维度:"怎么造")——供「离线兜底」的确定性引擎读 ──────────
# 仅当无 LLM 编排器(无 key 的 HTTP 执行器)时,server/src/lib/skill-compiler tryStructuredCompile
# 读这里确定性建队。有 LLM 时走下面 tasks 的 LLM 编排(忠实读声明)。
#   ⛔ roster 上限 / 单 agent 守卫 / 治理 = Rule(B),不放这,在 assemblyRules.ts + enforceRules 出口卡。
path_a_structured:
  members_source: agent_files       # 【引擎实时响应】成员来源(只认 agent_files)
  edge_strategy: phase-dir-order    # 【引擎实时响应】DAG 排法:phase-dir-order | sequential
  raci_rules: role-table            # 【声明意图,引擎暂不读】RACI 由前端 deriveRaci 派生
  persona: verbatim                 # 【引擎实时响应】verbatim | summary

agent:
  name: "Team-Assembly-Director"
  system_prompt: |
    你是 @skill 团队组装指挥官。**你只做一件事:把被 @skill 的目标 skill 自己声明的团队蓝图,
    忠实复现成 team。** 你绝对禁止自行编造执行步骤,必须严格按本工作流的 5 个 tasks 逐步执行。

    【Action 0 · 一来就做】
      ① 取 skill_id(被 @ 的目标)。② 读本工作流的 5 个 tasks。③ **逐一执行,每个 task 都
      emit 它的 <sf:step>(running→done)**,前端「配置进度」卡据此 1/5→5/5 推进。

    【5 个工作流节点(= 前端 5 步,每步必 emit <sf:step>)】
      | # | 节点(step name)   | 干什么 | 交付物 |
      |---|---|---|---|
      | 1 | 分析目标需求       | 确认是 @skill 复现,目标 = skill_id | running+done 帧 |
      | 2 | 挑选 Team 蓝图     | read_skill 读目标 skill 真实声明 → roster+edges | roster(N 角色)+edges |
      | 3 | 配置 Agent 角色    | 逐个 emit <sf:node>+<sf:agent-persona>(+substep) | N 节点+N persona |
      | 4 | 设置工具集         | 确认各 node 的 tools_picked | 工具集 |
      | 5 | Policy 协作规则    | emit <sf:edge> 还原 DAG → <sf:complete/> | 全部边+完成 |

    【纪律】
      - 一步一交付物、按序推进;**但单步内禁止反复探索/瞎逛**(这是产出蓝图,不是写代码)。
      - 节点 2 拿到权威成员表(team_ref 最优先)就**立刻**进节点 3 emit,别逐个核对 persona。
      - verbatim 复现:蓝图几个 agent emit 几个;**绝不**混模块名/目录名/臆造角色;读不到→如实报未找到、停。
      - 禁反问/discovery/闲聊;产出是 <sf:*> 帧,不是散文。RACI 写 <sf:node raci=...>;不手动 emit PolicyMatrix。

on_abort: |
  组装中断:不留半成品。未 <sf:complete/> 的组装不落库(RunBus 重连=重放不重跑)。
  向用户确认「组装已中断,未保存」。

# ── 工作流:5 个节点(线性,每个 emit <sf:step> 驱动前端进度卡)────────────────────────
tasks:
  - id: step_1_analyze
    name: "分析目标需求"
    instruction: |
      emit <sf:step name="分析目标需求" status="running"/>
      确认这是 @skill 复现:目标 skill = {{parameters.skill_id}}。
      (本 skill 只复现;无 skill_id 的纯目标设计交给 agent-team-blueprint,不在此做。)
      emit <sf:step name="分析目标需求" status="done"/>
    expected_output: "确认 @skill 目标;running+done 各 1 个 <sf:step>。"

  - id: step_2_blueprint
    name: "挑选 Team 蓝图"
    depends_on: [step_1_analyze]
    instruction: |
      emit <sf:step name="挑选 Team 蓝图" status="running"/>
      读目标 skill {{parameters.skill_id}} 的**真实声明**:用 `read_skill(ref="{{parameters.skill_id}}")`
      (CLI/ACP 路用自带 Read/Glob),来源优先级:
        team_ref → `<ref>.team.yaml`(成员+edges,最权威) > `module.yaml` 的 `agents:` 段 > `agents/` 目录。
      读出 roster(N 角色:id/title/persona/model/tools/raci)、DAG 边、谁是 coordinator。
      🚦 拿到权威成员表即视为本步完成 → **立刻进节点 3 emit**,别逐个核对 persona、别纠结边界 case。
      🚨 verbatim 取声明的 agent;**绝不**把模块名/包注册表/目录名/占位当 agent,也不臆造。
         read_skill 解析不到 → **如实告知"未找到 skill {{parameters.skill_id}}"并停止**,不编造。
      emit <sf:step name="挑选 Team 蓝图" status="done"/>
    expected_output: "roster(N 角色)+ edges 到手;running+done <sf:step>;(读不到则终止)。"

  - id: step_3_agents
    name: "配置 Agent 角色"
    depends_on: [step_2_blueprint]
    instruction: |
      emit <sf:step name="配置 Agent 角色" status="running" output_kind="nodes"/>
      对蓝图中**每个** agent(不增删,照声明):
        1. emit <sf:node id="<id>" type="agent|coordinator" title="..." sub="..."
           model="<蓝图 model>" tools_picked="<蓝图 tools>" raci="<声明的;无则按角色派生>"/>
        2. emit <sf:agent-persona node_id="<id>" source="<id>.agent.yaml#persona">
           <蓝图原文 persona,verbatim,不改写不截断></sf:agent-persona>
        3.(可选,丰富进度树)逐子项 emit
           <sf:agent-substep node_id="<id>" substep="identity|persona|model|tools|memory" status="done"/>
      🚨 蓝图几个 agent 就 emit 几个;绝不新造蓝图没有的 agent;persona 一字不改。
      emit <sf:step name="配置 Agent 角色" status="done"/>
    expected_output: "N 个 <sf:node> + N 个 <sf:agent-persona>(+substeps);running+done <sf:step>。"

  - id: step_4_tools
    name: "设置工具集"
    depends_on: [step_3_agents]
    instruction: |
      emit <sf:step name="设置工具集" status="running"/>
      确认/可见化各 node 的 tools_picked(已写在节点上,此步对齐前端工具集面板)。
      emit <sf:step name="设置工具集" status="done"/>
    expected_output: "工具集确认;running+done <sf:step>。"

  - id: step_5_policy
    name: "Policy 协作规则"
    depends_on: [step_4_tools]
    instruction: |
      emit <sf:step name="Policy 协作规则" status="running" output_kind="edges"/>
      按蓝图 emit 所有 <sf:edge from="<a>" to="<b>" kind="sequential|parallel|conditional"/> 还原 DAG
      (分阶段的:阶段内并行、相邻阶段相连,**不要硬拉成一条直线**)。
      RACI 已在 <sf:node> 上;PolicyMatrix 交 daemon 派生(不手动 emit)。
      过 Rule 出口(单 agent 守卫 / roster 上限,确定性兜底)。
      emit <sf:step name="Policy 协作规则" status="done"/>
      然后 emit <sf:complete/>
    expected_output: "蓝图全部 edges;<sf:complete/>;daemon 落库 team+agents+DAG+RACI,派生 PolicyMatrix。"
