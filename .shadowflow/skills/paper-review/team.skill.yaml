name: paper.review.v1
mode: serial
policy: strict
retry: 3
agents:
  - id: coord
    title: Coordinator
    sub: paper.coord.v1 · orchestrator
    avatar_char: C
    type: coordinator
    skill_ref: coord.skill.yaml
  - id: reader
    title: Reader
    sub: paper.reader.v1 · academic-reader
    avatar_char: R
    type: agent
    skill_ref: reader.skill.yaml
  - id: critic
    title: Critic
    sub: paper.critic.v1 · review-gate
    avatar_char: K
    type: agent
    skill_ref: critic.skill.yaml
  - id: writer
    title: Writer
    sub: paper.writer.v1 · review-author
    avatar_char: W
    type: agent
    skill_ref: writer.skill.yaml
edges:
  - { from: coord, to: reader }
  - { from: reader, to: critic }
  - { from: critic, to: writer }
