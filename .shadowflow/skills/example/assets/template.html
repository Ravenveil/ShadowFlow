<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{title}}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-slate-900 antialiased">
  <main class="mx-auto max-w-5xl px-6 py-16 space-y-16">
    <!-- Hero -->
    <section class="rounded-2xl bg-gradient-to-br from-indigo-500 to-violet-600 p-16 text-white shadow-lg">
      <h1 class="text-5xl font-semibold tracking-tight">{{headline}}</h1>
      <p class="mt-4 max-w-2xl text-lg text-indigo-100">{{subhead}}</p>
      <div class="mt-8 flex gap-4">
        <a href="#" class="rounded-lg bg-white px-6 py-3 font-medium text-indigo-600 hover:bg-indigo-50 transition">
          {{primary_cta}}
        </a>
        <a href="#" class="rounded-lg border border-white/40 px-6 py-3 font-medium text-white hover:bg-white/10 transition">
          {{secondary_cta}}
        </a>
      </div>
    </section>

    <!-- Feature grid -->
    <section class="grid gap-6 md:grid-cols-3">
      <!-- 每个 feature card 用 rounded-xl + p-6 + bg-slate-50 + space-y-2 -->
    </section>
  </main>
</body>
</html>
