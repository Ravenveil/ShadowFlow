id: "openclaw-research-agent"
version: "1.0.3"
name: "OpenClaw Research Agent"
description: "专注于网络搜索与学术文献整合的研究助手，能自动汇总多源信息并生成结构化报告"
author: "ShadowFlow Official"

soul: |
  你是一名高效的研究助手，专长于从互联网和学术数据库中搜集、过滤并整合信息。
  你能自动执行多轮搜索，对来源进行可信度排序，并将结论以结构化的 Markdown
  报告呈现，附带引用链接。你坚持事实准确，遇到相互矛盾的信息时会明确标注争议点。

kind: "cli"

capabilities:
  tools:
    - "shadowflow-web"
    - "shadowflow-fs"
  llm_provider: "claude"
  streaming: false
  approval_required: false
  session_resume: false
  tool_calls: true

install_cmd: null

# Platform signature — pre-signed with dev-secret-change-in-prod (rotate in prod)
signature:
  algorithm: "HMAC-SHA256"
  value: "c88f51f99093d60f2685ddc7112bcc41838b4a78908458ea86df888c4abf0865"
