app = "shadowflow-api"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile.api"

[http_service]
  internal_port = 8000
  force_https = true
  [[http_service.checks]]
    grace_period = "20s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[vm]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
