# Story 0.1 — ShadowFlow one-shot orchestration.
# Run `cp .env.example .env && docker compose up -d` to bring up the full MVP.

services:
  shadowflow-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: shadowflow/api:dev
    container_name: shadowflow-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
    networks:
      - shadowflow-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/').status==200 else 1)"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s

  shadowflow-web:
    build:
      context: .
      dockerfile: Dockerfile.web
    image: shadowflow/web:dev
    container_name: shadowflow-web
    ports:
      - "3000:3000"
    depends_on:
      shadowflow-api:
        condition: service_healthy
    networks:
      - shadowflow-net
    restart: unless-stopped

networks:
  shadowflow-net:
    driver: bridge
